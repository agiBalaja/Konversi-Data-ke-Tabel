<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Konversi Data ke Tabel</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f9ff;
      color: #333;
      padding: 30px;
    }

    h2 {
      text-align: center;
      color: #2c3e50;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
    }

    textarea {
      width: 75%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      resize: vertical;
      font-size: 10px;
      background-color: #ffffff;
    }

    input[type="number"] {
      width: 25%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      resize: vertical;
      font-size: 15px;
      background-color: #ffffff;
      font-color: red;
    }
  
    .btn {
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      margin-top: 15px;
      margin-right: 10px;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .btn:hover {
      background-color: #45a049;
    }

    .table-wrapper {
      margin-top: 25px;
      max-height: 550px; /* 13 baris kira-kira */
      overflow-y: auto;
      border: 1px solid #b0c4de;
      border-radius: 8px;
      background-color: #ffffff;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      border: 1px solid #dfe6e9;
      padding: 10px;
      text-align: left;
    }

    th {
      background-color: #e0f7fa;
      color: #2c3e50;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:nth-child(even) {
      background-color: #f9f9f9;
    }

    tr:hover td {
      background-color: #eaf4f7;
    }
  </style>
</head>
<body>

<h2>Konversi Data Baris ke Tabel</h2>

<label for="inputData">Data (Setiap baris = 1 kolom data):</label>
<textarea id="inputData" placeholder="Masukkan data di sini...">SLAMET

00000000000000

00000000000000
Sungai Gurun
PELEPAT LINTAS

4
1

JOHN DOE
00000000000000
00000000000000

Desa Indah
TANJUNG RAMAN
3
0</textarea>

<label for="columnCount">Jumlah Kolom per Record (misalnya 7):</label>
<input type="number" id="columnCount" placeholder="Contoh: 7">

<div>
  <button class="btn" onclick="convertToTable()">Konversi ke Tabel</button>
  <button class="btn" onclick="resetAll()">Reset</button>
  <button class="btn" onclick="copyTable()">Copy Tabel</button>
</div>

<div class="table-wrapper">
  <div id="tableResult"></div>
</div>

<script>
function convertToTable() {
  const input = document.getElementById("inputData").value.trim();
  const lines = input
  .split(/\n|\t/)                     // Pecah berdasarkan baris atau tab
  .map(line => line.trim())          // Hilangkan spasi kiri-kanan
  .filter(line => line !== "");      // Buang baris kosong


  const columnCount = parseInt(document.getElementById("columnCount").value);
  if (isNaN(columnCount) || columnCount <= 0) {
    alert("Masukkan jumlah kolom yang valid!");
    return;
  }

  const tableData = [];
  for (let i = 0; i < lines.length; i += columnCount) {
    const chunk = lines.slice(i, i + columnCount);
    if (chunk.length === columnCount) {
      tableData.push(chunk);
    }
  }

  const headers = [];
  for (let i = 1; i <= columnCount; i++) {
    headers.push("Kolom " + i);
  }

  let html = "<table id='dataTable'><thead><tr>";
  headers.forEach(h => html += `<th>${h}</th>`);
  html += "</tr></thead><tbody>";

  tableData.forEach(row => {
    html += "<tr>";
    row.forEach(cell => html += `<td>${cell}</td>`);
    html += "</tr>";
  });

  html += "</tbody></table>";
  document.getElementById("tableResult").innerHTML = html;
}

function resetAll() {
  document.getElementById("inputData").value = "";
  document.getElementById("columnCount").value = "";
  document.getElementById("tableResult").innerHTML = "";
}

function copyTable() {
  const table = document.getElementById("dataTable");
  if (!table) {
    alert("Tidak ada tabel untuk disalin.");
    return;
  }

  let text = "";
  const rows = table.querySelectorAll("tr");
  rows.forEach(row => {
    const cells = row.querySelectorAll("th, td");
    const rowText = Array.from(cells).map(cell => cell.innerText).join("\t");
    text += rowText + "\n";
  });

  navigator.clipboard.writeText(text).then(() => {
    alert("Tabel berhasil disalin ke clipboard!");
  }).catch(err => {
    alert("Gagal menyalin: " + err);
  });
}
</script>

</body>
  </html>
