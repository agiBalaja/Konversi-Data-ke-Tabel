<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Konversi Data ke Tabel</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f9ff;
      color: #333;
      padding: 15px; /* Dikurangi sedikit untuk mobile */
      margin: 0;
    }

    h2 {
      text-align: center;
      color: #2c3e50;
      font-size: 1.5rem;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
    }

    /* Input & Textarea Responsive */
    textarea {
      width: 100%; /* Full width di mobile */
      max-width: 800px; /* Batas di desktop */
      box-sizing: border-box; 
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      resize: vertical;
      font-size: 14px; /* Ukuran font lebih nyaman dibaca */
      background-color: #ffffff;
    }

    input[type="number"] {
      width: 100%;
      max-width: 200px;
      box-sizing: border-box;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      background-color: #ffffff;
    }
  
    /* Container Tombol agar tidak overflow */
    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 15px;
    }

    .btn {
      flex: 1; /* Tombol melebar otomatis */
      min-width: 120px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 15px;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      text-align: center;
    }

    .btn:hover {
      background-color: #45a049;
    }

    /* Area Tabel dengan Scroll Horizontal & Vertikal */
    .table-wrapper {
      margin-top: 25px;
      max-height: 500px; 
      overflow-y: auto; /* Scroll Vertikal */
      overflow-x: auto; /* Scroll Horizontal (Penting untuk mobile) */
      border: 1px solid #b0c4de;
      border-radius: 8px;
      background-color: #ffffff;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
      -webkit-overflow-scrolling: touch; /* Smooth scrolling di iOS */
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px; /* Sedikit lebih kecil untuk muat banyak data */
      min-width: 600px; /* Memaksa scroll horizontal jika layar sangat kecil */
    }

    th, td {
      border: 1px solid #dfe6e9;
      padding: 10px;
      text-align: left;
      white-space: nowrap; /* Menjaga teks tidak berantakan saat scroll */
    }

    th {
      background-color: #e0f7fa;
      color: #2c3e50;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:nth-child(even) {
      background-color: #f9f9f9;
    }

    tr:hover td {
      background-color: #eaf4f7;
    }
  </style>
</head>
<body>

<h2>Konversi Data Baris ke Tabel</h2>

<label for="inputData">Data (Setiap baris = 1 kolom data):</label>
<textarea id="inputData" rows="8" placeholder="Masukkan data di sini...">SLAMET
00000000000000
00000000000000
Sungai Gurun
PELEPAT LINTAS
4
1

JOHN DOE
00000000000000
00000000000000
Desa Indah
TANJUNG RAMAN
3
0</textarea>

<label for="columnCount">Jumlah Kolom per Record:</label>
<input type="number" id="columnCount" placeholder="Contoh: 7" value="7">

<div class="button-group">
  <button class="btn" onclick="convertToTable()">Konversi ke Tabel</button>
  <button class="btn" onclick="resetAll()">Reset</button>
  <button class="btn" onclick="copyTable()">Copy Tabel</button>
</div>

<div class="table-wrapper">
  <div id="tableResult"></div>
</div>

<script>
// Fungsi tetap sama sesuai permintaan (tanpa merubah logika fungsi)
function convertToTable() {
  const input = document.getElementById("inputData").value.trim();
  const lines = input
  .split(/\n|\t/)                     
  .map(line => line.trim())          
  .filter(line => line !== "");      


  const columnCount = parseInt(document.getElementById("columnCount").value);
  if (isNaN(columnCount) || columnCount <= 0) {
    alert("Masukkan jumlah kolom yang valid!");
    return;
  }

  const tableData = [];
  for (let i = 0; i < lines.length; i += columnCount) {
    const chunk = lines.slice(i, i + columnCount);
    if (chunk.length === columnCount) {
      tableData.push(chunk);
    }
  }

  const headers = [];
  for (let i = 1; i <= columnCount; i++) {
    headers.push("Kolom " + i);
  }

  let html = "<table id='dataTable'><thead><tr>";
  headers.forEach(h => html += `<th>${h}</th>`);
  html += "</tr></thead><tbody>";

  tableData.forEach(row => {
    html += "<tr>";
    row.forEach(cell => html += `<td>${cell}</td>`);
    html += "</tr>";
  });

  html += "</tbody></table>";
  document.getElementById("tableResult").innerHTML = html;
}

function resetAll() {
  document.getElementById("inputData").value = "";
  document.getElementById("columnCount").value = "";
  document.getElementById("tableResult").innerHTML = "";
}

function copyTable() {
  const table = document.getElementById("dataTable");
  if (!table) {
    alert("Tidak ada tabel untuk disalin.");
    return;
  }

  let text = "";
  const rows = table.querySelectorAll("tr");
  rows.forEach(row => {
    const cells = row.querySelectorAll("th, td");
    const rowText = Array.from(cells).map(cell => cell.innerText).join("\t");
    text += rowText + "\n";
  });

  navigator.clipboard.writeText(text).then(() => {
    alert("Tabel berhasil disalin ke clipboard!");
  }).catch(err => {
    alert("Gagal menyalin: " + err);
  });
}
</script>

</body>
</html>
